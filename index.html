<!DOCTYPE html>
<html lang="de" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Promptomizer V2.0</title>
    <meta name="description" content="Professioneller Prompt-Generator für Business-Anwender">
    <meta name="theme-color" content="#0f172a">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">

    <!-- Tailwind CSS (CDN for standalone usage) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        petrol: {
                            500: '#14b8a6', // Teal 500
                            600: '#0d9488', // Teal 600
                            700: '#0f766e', // Teal 700
                        },
                        navy: {
                            800: '#1e293b', // Slate 800
                            900: '#0f172a', // Slate 900
                            950: '#020617', // Slate 950
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        /* Hide Scrollbar but keep functionality */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* Smooth transitions */
        .page-transition { transition: opacity 0.2s ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-navy-900 text-slate-800 dark:text-slate-100 transition-colors duration-300 min-h-screen pb-20">

    <!-- HEADER -->
    <header class="fixed top-0 w-full z-40 bg-navy-900 text-white shadow-md border-b border-navy-800">
        <div class="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-cube text-petrol-500 text-xl"></i>
                <h1 class="font-semibold text-lg tracking-wide">Promptomizer <span class="text-petrol-500 text-xs align-top">V2.0</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <!-- Global Scenarios Button -->
                <button onclick="openScenarioModal()" class="text-sm bg-navy-800 hover:bg-navy-800/80 px-3 py-1.5 rounded-md border border-slate-700 transition-colors flex items-center gap-2">
                    <i class="fa-solid fa-layer-group text-petrol-500"></i>
                    <span class="hidden sm:inline">Szenarien</span>
                </button>
                <!-- Dark Mode Toggle -->
                <button onclick="toggleDarkMode()" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-white/10 transition-colors">
                    <i id="theme-icon" class="fa-solid fa-moon"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="max-w-3xl mx-auto pt-20 px-4">
        
        <!-- VIEW: CREATE (Editor) -->
        <div id="view-create" class="page-transition block">
            
            <!-- Toolbar -->
            <div class="flex justify-end mb-4">
                <button onclick="resetFields()" class="text-slate-400 hover:text-red-500 text-sm flex items-center gap-1 transition-colors">
                    <i class="fa-solid fa-trash-can"></i> Felder leeren
                </button>
            </div>

            <!-- Form Container -->
            <div id="fields-container" class="space-y-6">
                <!-- Fields are injected here via JS -->
            </div>

            <!-- Floating Generate Button -->
            <div class="fixed bottom-20 right-4 md:absolute md:bottom-auto md:right-0 md:relative md:mt-8 md:mb-8 flex justify-end z-30">
                <button onclick="generatePrompt()" class="bg-petrol-600 hover:bg-petrol-700 text-white font-medium py-3 px-6 rounded-full shadow-lg shadow-petrol-600/30 flex items-center gap-2 transform active:scale-95 transition-all">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                    <span>Erstellen & Kopieren</span>
                </button>
            </div>
        </div>

        <!-- VIEW: HISTORY -->
        <div id="view-history" class="page-transition hidden">
            <h2 class="text-xl font-semibold mb-6 text-navy-900 dark:text-white">Verlauf</h2>
            <div id="history-list" class="space-y-4">
                <!-- History Items injected via JS -->
                <div class="text-center text-slate-400 py-10">Keine Einträge vorhanden.</div>
            </div>
        </div>

        <!-- VIEW: FAVORITES -->
        <div id="view-favorites" class="page-transition hidden">
            <h2 class="text-xl font-semibold mb-6 text-navy-900 dark:text-white">Favoriten</h2>
            <div id="favorites-list" class="space-y-4">
                <!-- Favorites Items injected via JS -->
                <div class="text-center text-slate-400 py-10">Keine Favoriten gespeichert.</div>
            </div>
        </div>

    </main>

    <!-- BOTTOM NAVIGATION -->
    <nav class="fixed bottom-0 w-full bg-white dark:bg-navy-900 border-t border-slate-200 dark:border-navy-800 z-40 safe-area-pb">
        <div class="max-w-3xl mx-auto flex justify-around items-center h-16">
            <button onclick="switchTab('create')" class="nav-btn active flex flex-col items-center gap-1 w-full h-full justify-center text-petrol-600 dark:text-petrol-500" data-target="create">
                <i class="fa-regular fa-pen-to-square text-lg"></i>
                <span class="text-[10px] font-medium uppercase tracking-wider">Erstellen</span>
            </button>
            <button onclick="switchTab('history')" class="nav-btn flex flex-col items-center gap-1 w-full h-full justify-center text-slate-400 hover:text-navy-800 dark:hover:text-slate-200 transition-colors" data-target="history">
                <i class="fa-solid fa-clock-rotate-left text-lg"></i>
                <span class="text-[10px] font-medium uppercase tracking-wider">Historie</span>
            </button>
            <button onclick="switchTab('favorites')" class="nav-btn flex flex-col items-center gap-1 w-full h-full justify-center text-slate-400 hover:text-navy-800 dark:hover:text-slate-200 transition-colors" data-target="favorites">
                <i class="fa-regular fa-star text-lg"></i>
                <span class="text-[10px] font-medium uppercase tracking-wider">Favoriten</span>
            </button>
        </div>
    </nav>

    <!-- MODAL: SCENARIOS (Global) -->
    <div id="modal-scenarios" class="fixed inset-0 z-50 hidden bg-black/50 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white dark:bg-navy-800 w-full max-w-md rounded-xl shadow-2xl overflow-hidden flex flex-col max-h-[80vh]">
            <div class="p-4 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center bg-navy-900 text-white">
                <h3 class="font-medium flex items-center gap-2"><i class="fa-solid fa-layer-group"></i> Globale Szenarien</h3>
                <button onclick="closeModal('modal-scenarios')" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-4 bg-slate-50 dark:bg-navy-900 border-b border-slate-200 dark:border-slate-700">
                <div class="flex gap-2">
                    <input type="text" id="scenario-name-input" placeholder="Neues Szenario speichern..." class="flex-1 bg-white dark:bg-navy-800 border border-slate-300 dark:border-slate-600 rounded px-3 py-2 text-sm focus:outline-none focus:border-petrol-500 text-slate-800 dark:text-white">
                    <button onclick="saveScenario()" class="bg-petrol-600 hover:bg-petrol-700 text-white px-3 py-2 rounded text-sm"><i class="fa-solid fa-floppy-disk"></i></button>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto p-4 space-y-2" id="scenarios-list">
                <!-- List injected via JS -->
            </div>
        </div>
    </div>

    <!-- MODAL: SNIPPETS (Local per field) -->
    <div id="modal-snippets" class="fixed inset-0 z-50 hidden bg-black/50 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white dark:bg-navy-800 w-full max-w-md rounded-xl shadow-2xl overflow-hidden flex flex-col max-h-[80vh]">
            <div class="p-4 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center bg-petrol-700 text-white">
                <h3 class="font-medium flex items-center gap-2"><i class="fa-solid fa-book-bookmark"></i> Bausteine: <span id="snippet-modal-title" class="opacity-90"></span></h3>
                <button onclick="closeModal('modal-snippets')" class="text-white/70 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-4 bg-slate-50 dark:bg-navy-900 border-b border-slate-200 dark:border-slate-700">
                <div class="flex gap-2">
                    <input type="text" id="snippet-name-input" placeholder="Baustein benennen..." class="flex-1 bg-white dark:bg-navy-800 border border-slate-300 dark:border-slate-600 rounded px-3 py-2 text-sm focus:outline-none focus:border-petrol-500 text-slate-800 dark:text-white">
                    <button onclick="saveSnippet()" class="bg-petrol-600 hover:bg-petrol-700 text-white px-3 py-2 rounded text-sm"><i class="fa-solid fa-floppy-disk"></i></button>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto p-4 space-y-2" id="snippets-list">
                <!-- List injected via JS -->
            </div>
        </div>
    </div>

    <!-- TOAST NOTIFICATION -->
    <div id="toast" class="fixed bottom-24 left-1/2 transform -translate-x-1/2 bg-navy-900 text-white px-6 py-3 rounded-lg shadow-lg opacity-0 pointer-events-none transition-opacity duration-300 z-50 flex items-center gap-3">
        <i class="fa-solid fa-circle-check text-petrol-500"></i>
        <span id="toast-msg">Erfolg!</span>
    </div>

    <!-- JAVASCRIPT -->
    <script>
        // --- CONFIGURATION ---
        const FIELDS = [
            { id: 'role', label: 'Rolle & Funktion', icon: 'fa-user-tie', desc: 'Marketingfachkraft, erfahrener Entwickler, Projektleiter...' },
            { id: 'context', label: 'Kontext', icon: 'fa-earth-europe', desc: 'Wer soll das Ergebnis nutzen? Welche Situation liegt vor?' },
            { id: 'task', label: 'Aufgabe', icon: 'fa-bullseye', desc: 'Analysiere, erstelle, vergib, bewerte...' },
            { id: 'style', label: 'Stil & Tonalität', icon: 'fa-palette', desc: 'Sachlich, werbend, empathisch...' },
            { id: 'format', label: 'Format & Varianten', icon: 'fa-list-check', desc: 'Liste, Tabelle, kurzer Text, 3 Varianten...' }
        ];

        // --- STATE MANAGEMENT ---
        let currentSnippetFieldId = null;

        // --- INIT ---
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            renderFields();
            loadHistory();
            registerSW();
        });

        // --- THEME LOGIC ---
        function initTheme() {
            const savedTheme = localStorage.getItem('promptomizer_theme');
            const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (savedTheme === 'dark' || (!savedTheme && systemDark)) {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-icon').className = 'fa-solid fa-sun';
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('theme-icon').className = 'fa-solid fa-moon';
            }
        }

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.contains('dark');
            if (isDark) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('promptomizer_theme', 'light');
                document.getElementById('theme-icon').className = 'fa-solid fa-moon';
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('promptomizer_theme', 'dark');
                document.getElementById('theme-icon').className = 'fa-solid fa-sun';
            }
        }

        // --- RENDER INPUT FIELDS ---
        function renderFields() {
            const container = document.getElementById('fields-container');
            container.innerHTML = FIELDS.map(field => `
                <div class="bg-white dark:bg-navy-800 rounded-lg shadow-sm p-4 border border-slate-200 dark:border-slate-700 transition-colors">
                    <div class="flex justify-between items-center mb-2">
                        <label class="font-semibold text-navy-900 dark:text-slate-100 flex items-center gap-2">
                            <i class="fa-solid ${field.icon} text-petrol-500 w-5"></i>
                            ${field.label}
                        </label>
                        <button onclick="openSnippetModal('${field.id}')" class="text-slate-400 hover:text-petrol-600 dark:hover:text-petrol-400 text-sm px-2 py-1 rounded hover:bg-slate-100 dark:hover:bg-navy-900 transition-colors" title="Bausteine">
                            <i class="fa-solid fa-book"></i>
                        </button>
                    </div>
                    <div class="text-xs text-slate-500 dark:text-slate-400 mb-2 leading-relaxed">${field.desc}</div>
                    <textarea 
                        id="input-${field.id}" 
                        class="w-full h-32 p-3 bg-slate-50 dark:bg-navy-900 border border-slate-300 dark:border-slate-600 rounded-md focus:ring-2 focus:ring-petrol-500 focus:border-transparent resize-none text-slate-800 dark:text-slate-100 placeholder-slate-400 transition-all text-sm"
                        placeholder="..."></textarea>
                </div>
            `).join('');
        }

        // --- TAB NAVIGATION ---
        function switchTab(tabId) {
            // Update UI
            document.querySelectorAll('.page-transition').forEach(el => el.classList.add('hidden'));
            document.getElementById(`view-${tabId}`).classList.remove('hidden');
            
            // Update Nav Buttons
            document.querySelectorAll('.nav-btn').forEach(btn => {
                if(btn.dataset.target === tabId) {
                    btn.classList.remove('text-slate-400', 'hover:text-navy-800');
                    btn.classList.add('text-petrol-600', 'dark:text-petrol-500');
                } else {
                    btn.classList.add('text-slate-400', 'hover:text-navy-800');
                    btn.classList.remove('text-petrol-600', 'dark:text-petrol-500');
                }
            });

            if(tabId === 'history') loadHistory();
            if(tabId === 'favorites') loadFavorites();
        }

        // --- GENERATOR LOGIC ---
        function generatePrompt() {
            let finalText = "";
            let fieldValues = [];
            let hasContent = false;

            // Mapping for Output Headers
            const headerMap = {
                'role': '🤖 ROLLE',
                'context': '🌍 KONTEXT',
                'task': '🎯 AUFGABE',
                'style': '🎨 STIL UND TONALITÄT',
                'format': '🧪 VARIANTEN'
            };

            FIELDS.forEach(field => {
                const val = document.getElementById(`input-${field.id}`).value.trim();
                fieldValues.push(val);
                if (val) {
                    hasContent = true;
                    finalText += `**${headerMap[field.id]}**\n${val}\n\n`;
                }
            });

            if (!hasContent) {
                showToast("Bitte füllen Sie mindestens ein Feld aus.", true);
                return;
            }

            finalText = finalText.trim();

            // Copy to Clipboard
            navigator.clipboard.writeText(finalText).then(() => {
                showToast("Prompt kopiert & gespeichert!");
            }).catch(() => {
                showToast("Fehler beim Kopieren", true);
            });

            // Save to History
            const entry = {
                id: Date.now(),
                timestamp: new Date().toISOString(),
                text: finalText,
                fields: fieldValues, // Save raw fields to restore later
                favorite: false
            };

            const history = getStorage('history') || [];
            history.unshift(entry);
            // Limit history to 50 items
            if(history.length > 50) history.pop();
            saveStorage('history', history);
        }

        function resetFields() {
            if(confirm('Alle Felder leeren?')) {
                FIELDS.forEach(f => document.getElementById(`input-${f.id}`).value = '');
            }
        }

        // --- SCENARIO SYSTEM (GLOBAL) ---
        function openScenarioModal() {
            renderScenarioList();
            document.getElementById('modal-scenarios').classList.remove('hidden');
        }

        function saveScenario() {
            const name = document.getElementById('scenario-name-input').value.trim();
            if(!name) return;

            const currentValues = FIELDS.map(f => document.getElementById(`input-${f.id}`).value);
            // Check if completely empty
            if(currentValues.every(v => v.trim() === '')) {
                showToast("Szenario ist leer!", true);
                return;
            }

            const scenarios = getStorage('scenarios') || [];
            scenarios.push({ id: Date.now(), name, fields: currentValues });
            saveStorage('scenarios', scenarios);
            
            document.getElementById('scenario-name-input').value = '';
            renderScenarioList();
        }

        function loadScenario(id) {
            const scenarios = getStorage('scenarios') || [];
            const scenario = scenarios.find(s => s.id === id);
            if(scenario) {
                scenario.fields.forEach((val, index) => {
                    document.getElementById(`input-${FIELDS[index].id}`).value = val;
                });
                closeModal('modal-scenarios');
                showToast(`Szenario "${scenario.name}" geladen`);
            }
        }

        function deleteScenario(id) {
            let scenarios = getStorage('scenarios') || [];
            scenarios = scenarios.filter(s => s.id !== id);
            saveStorage('scenarios', scenarios);
            renderScenarioList();
        }

        function renderScenarioList() {
            const scenarios = getStorage('scenarios') || [];
            const list = document.getElementById('scenarios-list');
            
            if(scenarios.length === 0) {
                list.innerHTML = '<div class="text-slate-400 text-center text-sm py-4">Noch keine Szenarien gespeichert.</div>';
                return;
            }

            list.innerHTML = scenarios.map(s => `
                <div class="flex items-center justify-between bg-white dark:bg-navy-800 border border-slate-200 dark:border-slate-700 p-3 rounded hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
                    <button onclick="loadScenario(${s.id})" class="flex-1 text-left font-medium text-navy-900 dark:text-slate-100 text-sm truncate pr-2">
                        ${s.name}
                    </button>
                    <button onclick="deleteScenario(${s.id})" class="text-slate-400 hover:text-red-500 p-1">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
            `).join('');
        }

        // --- SNIPPET SYSTEM (LOCAL) ---
        function openSnippetModal(fieldId) {
            currentSnippetFieldId = fieldId;
            const field = FIELDS.find(f => f.id === fieldId);
            document.getElementById('snippet-modal-title').innerText = field.label;
            renderSnippetList();
            document.getElementById('modal-snippets').classList.remove('hidden');
        }

        function saveSnippet() {
            const name = document.getElementById('snippet-name-input').value.trim();
            const text = document.getElementById(`input-${currentSnippetFieldId}`).value.trim();

            if(!name || !text) {
                showToast("Name oder Feld leer!", true);
                return;
            }

            const allSnippets = getStorage('snippets') || {};
            if(!allSnippets[currentSnippetFieldId]) allSnippets[currentSnippetFieldId] = [];
            
            allSnippets[currentSnippetFieldId].push({ id: Date.now(), name, text });
            saveStorage('snippets', allSnippets);

            document.getElementById('snippet-name-input').value = '';
            renderSnippetList();
        }

        function loadSnippet(id) {
            const allSnippets = getStorage('snippets') || {};
            const list = allSnippets[currentSnippetFieldId] || [];
            const snip = list.find(s => s.id === id);
            
            if(snip) {
                const el = document.getElementById(`input-${currentSnippetFieldId}`);
                // Optional: Append or Replace? Let's Replace for simplicity as per requirement implies "setting" text.
                // But professional tools usually append or user decides. Let's append if not empty?
                // Request said "Load existing... text blocks".
                // Strategy: If empty, set. If not, confirm replace.
                if(el.value.trim() !== '' && !confirm("Feld überschreiben?")) return;
                
                el.value = snip.text;
                closeModal('modal-snippets');
            }
        }

        function deleteSnippet(id) {
            const allSnippets = getStorage('snippets') || {};
            if(allSnippets[currentSnippetFieldId]) {
                allSnippets[currentSnippetFieldId] = allSnippets[currentSnippetFieldId].filter(s => s.id !== id);
                saveStorage('snippets', allSnippets);
                renderSnippetList();
            }
        }

        function renderSnippetList() {
            const allSnippets = getStorage('snippets') || {};
            const list = allSnippets[currentSnippetFieldId] || [];
            const container = document.getElementById('snippets-list');

            if(list.length === 0) {
                container.innerHTML = '<div class="text-slate-400 text-center text-sm py-4">Keine Bausteine für dieses Feld.</div>';
                return;
            }

            container.innerHTML = list.map(s => `
                <div class="flex items-center justify-between bg-white dark:bg-navy-800 border border-slate-200 dark:border-slate-700 p-3 rounded hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
                    <button onclick="loadSnippet(${s.id})" class="flex-1 text-left">
                        <div class="font-medium text-navy-900 dark:text-slate-100 text-sm truncate">${s.name}</div>
                        <div class="text-xs text-slate-500 truncate w-48">${s.text.substring(0,30)}...</div>
                    </button>
                    <button onclick="deleteSnippet(${s.id})" class="text-slate-400 hover:text-red-500 p-1">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
            `).join('');
        }

        // --- HISTORY & FAVORITES UI ---
        function renderCard(item, isHistoryView) {
            const date = new Date(item.timestamp).toLocaleString('de-DE', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
            // Extract a preview title from Role or Context or Task
            const preview = (item.fields[0] || item.fields[2] || "Unbenannter Prompt").substring(0, 40);

            return `
            <div class="bg-white dark:bg-navy-800 rounded-lg shadow-sm p-4 border border-slate-200 dark:border-slate-700">
                <div class="flex justify-between items-start mb-2">
                    <span class="text-xs text-slate-400 font-mono">${date}</span>
                    <div class="flex gap-2">
                        <button onclick="toggleFavorite(${item.id})" class="${item.favorite ? 'text-yellow-400' : 'text-slate-300 hover:text-yellow-400'} transition-colors">
                            <i class="${item.favorite ? 'fa-solid' : 'fa-regular'} fa-star"></i>
                        </button>
                        <button onclick="deleteHistoryItem(${item.id})" class="text-slate-300 hover:text-red-500 transition-colors">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                </div>
                <h3 class="font-semibold text-navy-900 dark:text-white mb-2 text-sm">${preview}...</h3>
                <div class="bg-slate-50 dark:bg-navy-900 p-2 rounded border border-slate-100 dark:border-slate-700 text-xs text-slate-600 dark:text-slate-400 font-mono overflow-hidden h-16 mb-3">
                    ${item.text.replace(/\n/g, '<br>')}
                </div>
                <div class="flex justify-end gap-2">
                    <button onclick="restorePrompt(${item.id})" class="text-xs bg-navy-100 dark:bg-navy-700 text-navy-700 dark:text-slate-200 px-2 py-1 rounded hover:bg-navy-200 transition-colors">
                        <i class="fa-solid fa-pen"></i> Bearbeiten
                    </button>
                    <button onclick="copyText('${item.text.replace(/'/g, "\\'").replace(/\n/g, "\\n")}')" class="text-xs bg-petrol-100 dark:bg-petrol-900/30 text-petrol-700 dark:text-petrol-400 px-2 py-1 rounded hover:bg-petrol-200 transition-colors">
                        <i class="fa-solid fa-copy"></i> Kopieren
                    </button>
                </div>
            </div>`;
        }

        function loadHistory() {
            const history = getStorage('history') || [];
            const container = document.getElementById('history-list');
            if(history.length === 0) {
                container.innerHTML = '<div class="text-center text-slate-400 py-10">Keine Einträge vorhanden.</div>';
            } else {
                container.innerHTML = history.map(item => renderCard(item, true)).join('');
            }
        }

        function loadFavorites() {
            const history = getStorage('history') || [];
            const favs = history.filter(h => h.favorite);
            const container = document.getElementById('favorites-list');
            if(favs.length === 0) {
                container.innerHTML = '<div class="text-center text-slate-400 py-10">Keine Favoriten gespeichert.</div>';
            } else {
                container.innerHTML = favs.map(item => renderCard(item, false)).join('');
            }
        }

        function toggleFavorite(id) {
            let history = getStorage('history') || [];
            const idx = history.findIndex(h => h.id === id);
            if(idx > -1) {
                history[idx].favorite = !history[idx].favorite;
                saveStorage('history', history);
                // Refresh current view
                if(!document.getElementById('view-favorites').classList.contains('hidden')) loadFavorites();
                else loadHistory();
            }
        }

        function deleteHistoryItem(id) {
            if(!confirm("Eintrag löschen?")) return;
            let history = getStorage('history') || [];
            history = history.filter(h => h.id !== id);
            saveStorage('history', history);
            if(!document.getElementById('view-favorites').classList.contains('hidden')) loadFavorites();
            else loadHistory();
        }

        function restorePrompt(id) {
            const history = getStorage('history') || [];
            const item = history.find(h => h.id === id);
            if(item && item.fields) {
                item.fields.forEach((val, index) => {
                    if(FIELDS[index]) document.getElementById(`input-${FIELDS[index].id}`).value = val;
                });
                switchTab('create');
                showToast("Prompt in Editor geladen");
            }
        }

        // --- UTILS ---
        function getStorage(key) {
            const data = localStorage.getItem(`promptomizer_${key}`);
            return data ? JSON.parse(data) : null;
        }

        function saveStorage(key, data) {
            localStorage.setItem(`promptomizer_${key}`, JSON.stringify(data));
        }

        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
        }

        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => showToast("Kopiert!"));
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-msg');
            toastMsg.innerText = msg;
            toast.classList.remove('opacity-0', 'translate-y-4');
            
            if(isError) {
                toast.classList.add('bg-red-600');
                toast.classList.remove('bg-navy-900');
            } else {
                toast.classList.remove('bg-red-600');
                toast.classList.add('bg-navy-900');
            }

            setTimeout(() => {
                toast.classList.add('opacity-0');
            }, 3000);
        }

        // --- SERVICE WORKER REG ---
        function registerSW() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registriert', reg))
                    .catch(err => console.error('SW Fehler', err));
            }
        }
    </script>
</body>
</html>
